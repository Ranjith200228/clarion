# deploy/fly.toml
#
# Fly.io app config for the Clarion single-process bundle.
#
# Deploy with:
#
#     fly launch --copy-config --no-deploy   # one-time, picks region etc.
#     fly secrets set OPENAI_API_KEY=sk-...
#     fly deploy
#
# Fly reads this file at the repo root by default. Adjust ``app`` to a
# globally-unique name before the first deploy.

app = "clarion-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CLARION_DATA_DIR = "/app/data"
  CLARION_CONFIG_DIR = "/app/configs"
  GRADIO_HOST = "0.0.0.0"
  GRADIO_PORT = "7860"
  CLARION_API_HOST = "127.0.0.1"
  CLARION_API_PORT = "8000"
  CLARION_MODEL = "gpt-4o-mini"

# OPENAI_API_KEY goes in via ``fly secrets set OPENAI_API_KEY=...``
# and is exposed to the container as a regular env var.

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "stop"     # scale to zero between hits
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
