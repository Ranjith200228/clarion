# deploy/cloudrun.yaml
#
# GCP Cloud Run service descriptor for the Clarion single-process bundle.
# Deploy with:
#
#   gcloud run services replace deploy/cloudrun.yaml --region <region>
#
# Replace placeholders before applying:
#   <PROJECT>        — your GCP project id
#   <REGION>         — e.g. us-central1
#   <IMAGE_TAG>      — the tag of the image you pushed to Artifact Registry
#   <SECRET_NAME>    — Secret Manager entry holding OPENAI_API_KEY
#
# Cloud Run health probes hit the same /health endpoint the Phase 15
# compose healthcheck uses. The default 7860 port matches the
# Dockerfile's GRADIO_PORT and HF Spaces' app_port.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: clarion
  labels:
    cloud.googleapis.com/location: <REGION>
spec:
  template:
    metadata:
      annotations:
        # Cloud Run instance sizing — cpu-basic-ish.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      timeoutSeconds: 300
      containers:
        - image: <REGION>-docker.pkg.dev/<PROJECT>/clarion/clarion:<IMAGE_TAG>
          ports:
            - name: http1
              containerPort: 7860
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: CLARION_DATA_DIR
              value: /app/data
            - name: CLARION_CONFIG_DIR
              value: /app/configs
            - name: GRADIO_HOST
              value: 0.0.0.0
            - name: GRADIO_PORT
              value: "7860"
            - name: CLARION_API_HOST
              value: 127.0.0.1
            - name: CLARION_API_PORT
              value: "8000"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: <SECRET_NAME>
                  key: latest
          # Cloud Run hits this every 240s in production. The agent
          # process is fully warm by then.
          livenessProbe:
            httpGet:
              path: /
              port: 7860
            timeoutSeconds: 5
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /
              port: 7860
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 24  # 2 minutes for cold start
  traffic:
    - percent: 100
      latestRevision: true
